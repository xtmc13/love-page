<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>❤️ 王乐君我爱你</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            overflow: hidden;
            height: 100vh;
            touch-action: none;
        }
        canvas { display: block; }
        .text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 28px;
            font-family: "Microsoft YaHei", sans-serif;
            text-shadow: 0 0 20px #ff69b4, 0 0 40px #ff69b4;
            pointer-events: none;
            white-space: nowrap;
            z-index: 10;
            animation: fadeIn 2s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        .click-hint {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="text">❤️ 王乐君我爱你 ❤️</div>
    <div class="click-hint">点击屏幕 ❤️</div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        // 樱花花瓣类
        class Petal {
            constructor(x, y, isClick = false) {
                this.x = x || Math.random() * width;
                this.y = y || -10;
                this.size = Math.random() * 8 + 4;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = isClick ? Math.random() * 3 + 2 : Math.random() * 1.5 + 0.5;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 4 - 2;
                this.opacity = Math.random() * 0.5 + 0.5;
                this.color = `rgba(255, ${Math.floor(Math.random() * 50 + 183)}, ${Math.floor(Math.random() * 50 + 207)}, ${this.opacity})`;
                this.type = Math.floor(Math.random() * 3); // 0: 圆形, 1: 椭圆形, 2: 心形
            }
            
            update() {
                this.y += this.speedY;
                this.x += this.speedX + Math.sin(this.y * 0.01) * 0.5;
                this.rotation += this.rotationSpeed;
                
                if (this.y > height + 20) {
                    this.reset();
                }
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = -10;
                this.size = Math.random() * 8 + 4;
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.fillStyle = this.color;
                
                if (this.type === 0) {
                    // 圆形花瓣
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.type === 1) {
                    // 椭圆形
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.size / 2, this.size / 3, 0, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // 简化心形
                    ctx.beginPath();
                    ctx.moveTo(0, -this.size/4);
                    ctx.bezierCurveTo(this.size/2, -this.size, this.size, -this.size/4, 0, this.size/2);
                    ctx.bezierCurveTo(-this.size, -this.size/4, -this.size/2, -this.size, 0, -this.size/4);
                    ctx.fill();
                }
                
                ctx.restore();
            }
        }
        
        // 初始化樱花
        for (let i = 0; i < 80; i++) {
            const petal = new Petal();
            petal.y = Math.random() * height;
            particles.push(petal);
        }
        
        // 绘制中心大爱心
        function drawCenterHeart() {
            const centerX = width / 2;
            const centerY = height / 2;
            const time = Date.now() * 0.002;
            const scale = 1 + Math.sin(time) * 0.08;
            const glow = 20 + Math.sin(time) * 10;
            
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.scale(scale, scale);
            
            // 发光效果
            const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 120);
            gradient.addColorStop(0, 'rgba(255, 105, 180, 0.6)');
            gradient.addColorStop(0.5, 'rgba(255, 105, 180, 0.2)');
            gradient.addColorStop(1, 'rgba(255, 105, 180, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(-120, -120, 240, 240);
            
            // 爱心
            ctx.fillStyle = '#ff69b4';
            ctx.shadowColor = '#ff69b4';
            ctx.shadowBlur = glow;
            
            ctx.beginPath();
            ctx.moveTo(0, -25);
            ctx.bezierCurveTo(0, -60, -60, -60, -60, -25);
            ctx.bezierCurveTo(-60, 10, 0, 50, 0, 70);
            ctx.bezierCurveTo(0, 50, 60, 10, 60, -25);
            ctx.bezierCurveTo(60, -60, 0, -60, 0, -25);
            ctx.fill();
            
            ctx.restore();
        }
        
        // 动画循环
        function animate() {
            // 渐变背景效果
            ctx.fillStyle = 'rgba(15, 12, 41, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            drawCenterHeart();
            
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // 点击增加樱花
        document.addEventListener('click', (e) => {
            for (let i = 0; i < 20; i++) {
                particles.push(new Petal(e.clientX, e.clientY, true));
            }
        });
        
        // 触摸也支持
        document.addEventListener('touchstart', (e) => {
            for (let i = 0; i < 20; i++) {
                const touch = e.touches[0];
                particles.push(new Petal(touch.clientX, touch.clientY, true));
            }
        });
    </script>
</body>
</html>
